<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mehedi Hasan - AI Assistant</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-robot"></i>
                    <span>Mehedi's AI</span>
                </div>
                <div class="header-actions">
                    <button id="themeToggle" class="theme-btn" title="Toggle Theme">
                        <i class="fas fa-moon"></i>
                    </button>
                </div>
            </div>
            <p class="subtitle">আমি Mehedi-এর ব্যক্তিগত সহকারী, যেকোনো প্রশ্ন করুন</p>
        </header>

        <!-- Chat Messages -->
        <div class="chat-container" id="chatContainer">
            <div class="messages" id="messages">
                <div class="message bot-message">
                    <div class="avatar"><i class="fas fa-robot"></i></div>
                    <div class="message-content">
                        <div class="bubble">👋 হ্যালো! আমি Mehedi-এর AI সহকারী। তার সম্পর্কে যেকোনো প্রশ্ন করতে পারেন।</div>
                        <div class="timestamp">এখন</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Typing Indicator -->
        <div id="typingIndicator" class="typing-indicator hidden">
            <div class="avatar"><i class="fas fa-robot"></i></div>
            <div class="message-content">
                <div class="bubble typing-bubble">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-container">
            <div class="input-wrapper">
                <textarea id="userInput" rows="1" placeholder="আপনার প্রশ্ন লিখুন..." maxlength="1000"></textarea>
                <button id="sendBtn" class="send-btn" title="Send">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
            <div class="input-footer">
                <span class="char-counter"><span id="charCount">0</span>/1000</span>
                <span class="status" id="statusText">🟢 অনলাইন</span>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
