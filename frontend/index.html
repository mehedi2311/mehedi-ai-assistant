<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mehedi Hasan - AI Assistant</title>
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="/frontend/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <!-- Main Application Container -->
    <div class="app-container">
        
        <!-- Application Header -->
        <header class="app-header">
            <div class="header-content">
                <!-- Logo and Brand -->
                <div class="logo">
                    <i class="fas fa-robot"></i>
                    <span>Mehedi's AI</span>
                </div>
                
                <!-- Header Actions -->
                <div class="header-actions">
                    <button id="themeToggle" class="theme-btn" title="Toggle Theme">
                        <i class="fas fa-moon"></i>
                    </button>
                </div>
            </div>
            <p class="subtitle">Your personal AI assistant for all your questions</p>
        </header>

        <!-- Chat Messages Container -->
        <div class="chat-container" id="chatContainer">
            <div class="messages" id="messages">
                <!-- Initial Welcome Message -->
                <div class="message bot-message">
                    <div class="avatar"><i class="fas fa-robot"></i></div>
                    <div class="message-content">
                        <div class="bubble">👋 Hello! I am Mehedi's AI assistant. Feel free to ask me anything about him.</div>
                        <div class="timestamp">Now</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Typing Indicator -->
        <div id="typingIndicator" class="typing-indicator hidden">
            <div class="avatar"><i class="fas fa-robot"></i></div>
            <div class="message-content">
                <div class="bubble typing-bubble">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-container">
            <div class="input-wrapper">
                <!-- User Input Field -->
                <textarea 
                    id="userInput" 
                    rows="1" 
                    placeholder="Type your question here..." 
                    maxlength="1000"
                ></textarea>
                
                <!-- Send Button -->
                <button id="sendBtn" class="send-btn" title="Send Message">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
            
            <!-- Input Footer -->
            <div class="input-footer">
                <span class="char-counter">
                    <span id="charCount">0</span>/1000
                </span>
                <span class="status" id="statusText">🟢 Online</span>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="/frontend/script.js"></script>
</body>
</html>
