<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mehedi Hasan - AI Assistant</title>
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="/frontend/style.css">
</head>
<body>
    <!-- Main Application Container -->
    <div class="app-container">
        
        <!-- Application Header -->
        <header class="app-header">
            <div class="header-content">
                <!-- Logo and Brand -->
                <div class="logo">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    <span>Mehedi's AI Assistant</span>
                </div>
                
                <!-- Header Actions -->
                <div class="header-actions">
                    <button id="themeToggle" class="theme-btn" title="Toggle Theme">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                    </button>
                </div>
            </div>
            <p class="subtitle">Ask me anything about Mehedi</p>
        </header>

        <!-- Chat Messages Container -->
        <div class="chat-container" id="chatContainer">
            <div class="messages" id="messages">
                <!-- Messages will be rendered by JavaScript -->
            </div>
        </div>

        <!-- Typing Indicator -->
        <div id="typingIndicator" class="typing-indicator hidden">
            <div class="avatar">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>
            <div class="message-content">
                <div class="bubble typing-bubble">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-container">
            <div class="input-wrapper">
                <!-- User Input Field -->
                <textarea 
                    id="userInput" 
                    rows="1" 
                    placeholder="Type your question here..." 
                    maxlength="1000"
                ></textarea>
                
                <!-- Send Button -->
                <button id="sendBtn" class="send-btn" title="Send Message">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
            
            <!-- Input Footer -->
            <div class="input-footer">
                <span class="char-counter">
                    <span id="charCount">0</span>/1000
                </span>
                <span class="status" id="statusText">🟢 Online</span>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="/frontend/script.js"></script>
</body>
</html>
